<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Student Registration Form</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: serif;
        }

        body{
            background-color: #f5f5f5;
        }

        .container{
            width: 80%;
            margin: 30px auto;
        }

        h1{
            text-align: center;
            color: darkblue;
            margin-bottom: 25px;
        }

        form label{
            font-weight: bold;
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea{
            width: 100%;
            padding: 10px;
            border: 1px solid #999;
            border-radius: 3px;
        }

        .gender{
            margin-top: 10px;
        }

        .gender input{
            width: auto;
            margin-right: 5px;
        }

        button{
            margin-top: 15px;
            padding: 10px 20px;
            background-color: darkblue;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th{
            background-color: darkblue;
            color: white;
            padding: 10px;
            border: 1px solid #444;
        }

        td{
            text-align: center;
            padding: 10px;
            border: 1px solid #444;
        }

        h2{
            text-align: center;
            color: darkblue;
            margin-top: 30px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Student Registration Form</h1>

        <form>

            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>Email</label>
            <input type="email" placeholder="Enter your email">

            <label>Password</label>
            <input type="password" placeholder="Enter password">

            <label>Phone Number</label>
            <input type="tel" placeholder="Enter phone number">

            <label>Date of Birth</label>
            <input type="date">

            <label>Select Course</label>
            <select>
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
                <option>React</option>
            </select>

            <label>Gender</label>

            <div class="gender">
                <input type="radio" name="gender"> Male

                <input type="radio" name="gender"> Female
            </div>

            <label>Address</label>
            <textarea rows="4" placeholder="Enter address"></textarea>

            <button type="submit">Register</button>

        </form>

        <h2>Student Data Table</h2>

        <table>

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>City</th>
            </tr>

            <tr>
                <td>1</td>
                <td>Rahul</td>
                <td>HTML</td>
                <td>Mumbai</td>
            </tr>

            <tr>
                <td>2</td>
                <td>Sneha</td>
                <td>CSS</td>
                <td>Pune</td>
            </tr>

            <tr>
                <td>3</td>
                <td>Amit</td>
                <td>JavaScript</td>
                <td>Nashik</td>
            </tr>

            <tr>
                <td>4</td>
                <td>Priya</td>
                <td>React</td>
                <td>Nagpur</td>
            </tr>

        </table>

    </div>

</body>
</html>
